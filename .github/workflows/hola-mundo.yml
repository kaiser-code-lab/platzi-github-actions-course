name: Hola Mundo
on: [push]
jobs:
  hola-mundo-job:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@v3
      - name: setup node
        uses: actions/setup-node@v6.3.0
        with:
          node-version: 24
      - name: run-script
        run: node script/saludo.js
  
    
